name: Build rootfs and package

on:
  workflow_call:
    inputs:
      device:
        required: true
        type: string
      devicesrc:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      device:
        required: true
        type: string
      devicesrc:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Setup pmbootstrap
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap --depth=1
          cd pmbootstrap
          chmod +x -v pmbootstrap.py

      - name: Setup pmbootstrap config
        run: |
           mkdir -p /home/runner/.config
           # Download device config
           aria2c -d /home/runner/.config -o pmbootstrap_v3.cfg https://github.com/sekaimoe/pmos_ci_build/raw/main/device/${{ inputs.device }}/pmbootstrap_v3.cfg
           chmod 644 -v /home/runner/.config/pmbootstrap_v3.cfg
           # Pre-create work directory to avoid interactive prompt
           mkdir -p /home/runner/.local/var/pmbootstrap/cache_git
           echo "8" > /home/runner/.local/var/pmbootstrap/version

      - name: First Initialize pmbootstrap (basic setup)
        run: |
           # Quick init just to clone pmaports (use qemu which always exists)
           echo -e '\n\n\n\n\n\n\n\n\n\n' | ./pmbootstrap/pmbootstrap.py --details-to-stdout init || true

      - name: Clone device package
        run: |
          if [ ! -d /home/runner/.local/var/pmbootstrap/cache_git/pmaports/device/testing/device-${{ inputs.device }} ]; then
              git clone ${{ inputs.devicesrc }} $HOME/tmp
              mv -v $HOME/tmp/* /home/runner/.local/var/pmbootstrap/cache_git/pmaports/device/testing/
              echo "file_changed=true" >> $GITHUB_ENV
          else
              echo "file_changed=false" >> $GITHUB_ENV
          fi

      - name: Re-initialize with device
        run: |
           # Now device exists, init with our cfg (device, ui, timezone will be loaded correctly)
           yes '' | ./pmbootstrap/pmbootstrap.py --details-to-stdout init || true

      - name: Build linux package
        if: env.file_changed == 'true'
        run: |
          if [ -d /home/runner/.local/var/pmbootstrap/cache_git/pmaports/device/testing/device-${{ inputs.device }} ]; then
               ./pmbootstrap/pmbootstrap.py --details-to-stdout checksum linux-${{ inputs.device}}
               ./pmbootstrap/pmbootstrap.py --details-to-stdout build linux-${{ inputs.device}} --force
          fi

      - name: Build device package
        if: env.file_changed == 'true'
        run: |
           ./pmbootstrap/pmbootstrap.py --details-to-stdout checksum device-${{ inputs.device}}
           ./pmbootstrap/pmbootstrap.py --details-to-stdout build device-${{ inputs.device}} --force

      - name: Build firmware package
        if: env.file_changed == 'true'
        run: |
          if [ -d /home/runner/.local/var/pmbootstrap/cache_git/pmaports/device/testing/firmware-${{ inputs.device }} ]; then
              ./pmbootstrap/pmbootstrap.py --details-to-stdout checksum firmware-${{ inputs.device}}
              ./pmbootstrap/pmbootstrap.py  --details-to-stdout build firmware-${{ inputs.device}} --force
          fi

      - name: Build rootfs
        run: yes '123456' | ./pmbootstrap/pmbootstrap.py --details-to-stdout install --android-recovery-zip --recovery-install-partition=data

      - name: Export rootfs
        if: github.event_name == 'workflow_dispatch'
        run: ./pmbootstrap/pmbootstrap.py --details-to-stdout export

      - name: Upload log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log
          path: /home/runner/.local/var/pmbootstrap/log.txt


      - name: Upload rootfs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.device }}
          path: /tmp/postmarketOS-export/*
